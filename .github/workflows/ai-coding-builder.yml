name: Autonomous AI Coding Builder
on:
  workflow_dispatch:
  issue_comment:
    types: [created]

jobs:
  build:
    if: contains(github.event.comment.body, '@claude build') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
    env:
      # Forces GitHub to use the latest stable Node version to avoid warnings
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true 
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      - name: Setup Git
        run: |
          git config --global user.name "Claude-Bot"
          git config --global user.email "claude-bot@myrqai.com"
      
      - name: Pre-install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Claude Continuous Worker
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          # This loop runs until 'finished.txt' is created
          until [ -f finished.txt ]; do
            echo "Claude is starting a new task..."
            
            # Added a 1-hour session timeout to prevent orphan process errors
            timeout 3600s sh -c "yes | claude --dangerously-skip-permissions --print 'Read CLAUDE.md. Fix the next broken link or missing content gap in index.html. After each fix, exit so I can commit. If 100% done, create finished.txt.'" || {
              echo "Task paused or Limit reached. Sleeping 5 mins..."
              sleep 300
            }

            # Sync progress back to the repo immediately
            echo "Syncing changes to GitHub..."
            git add .
            if git commit -m "Claude: Autonomous update to AI Coding Academy"; then
              git push origin HEAD
            else
              echo "No changes detected in this cycle."
            fi
          done
