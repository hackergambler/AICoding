name: Autonomous AI Coding Builder
on:
  workflow_dispatch:
  issue_comment:
    types: [created]

jobs:
  build:
    if: contains(github.event.comment.body, '@claude build') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Ensures full history for stable pushing

      - name: Setup Git
        run: |
          git config --global user.name "Claude-Bot"
          git config --global user.email "claude-bot@myrqai.com"
      
      - name: Claude Continuous Worker
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          # This loop runs until Claude creates 'finished.txt'
          until [ -f finished.txt ]; do
            echo "Claude is starting a new task..."
            
            # Use 'yes |' to bypass the approval prompt since '--yes' was unrecognized
            # Removed the problematic '--yes' flag
            yes | npx @anthropic-ai/claude-code --dangerously-skip-permissions --print "Read CLAUDE.md. Fix the next broken link or missing content gap in index.html. After each fix, exit so I can commit. If 100% done, create finished.txt." || {
              echo "API Limit or Credit issue detected. Sleeping 5 mins..."
              sleep 300
            }

            # Commit and Push progress after every single fix
            echo "Syncing changes to GitHub..."
            git add .
            if git commit -m "Claude: Autonomous update to AI Coding Academy"; then
              git push origin HEAD
            else
              echo "No changes were made in this iteration."
            fi
          done
