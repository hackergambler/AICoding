name: Autonomous AI Coding Builder
on:
  workflow_dispatch:
  issue_comment:
    types: [created]

jobs:
  build:
    if: contains(github.event.comment.body, '@claude build') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Git
        run: |
          git config --global user.name "Claude-Bot"
          git config --global user.email "claude-bot@myrqai.com"
      
      - name: Claude Continuous Worker
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          # This loop runs until Claude creates 'finished.txt'
          until [ -f finished.txt ]; do
            echo "Claude is starting a new task..."
            
            # --yes: Auto-approves file writes
            # --dangerously-skip-permissions: Bypasses the manual approval prompts
            npx @anthropic-ai/claude-code --yes --dangerously-skip-permissions --print "Read CLAUDE.md. Fix the next broken link or missing content gap. After each fix, exit so I can commit the changes. If 100% done, create finished.txt." || {
              echo "API Limit or Credit issue. Sleeping 5 mins..."
              sleep 300
            }

            # Commit progress after every single fix so you never lose work
            git add .
            git commit -m "Claude: Fixed a link/added content" || echo "No changes to commit"
            git push
          done
